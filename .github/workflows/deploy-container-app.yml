name: Deploy Scanner App to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - requirements.txt
      - complete.py
      - scan_bridge.py
      - port_scan.py
      - discovery_pipeline/**
      - dns/**
      - domain/**
      - whoIs/**
      - scanner-app/**
      - .github/workflows/deploy-container-app.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-scanner-app-production
  cancel-in-progress: true

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'stage-scanner-app' }}
  CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'aca-scanner-app' }}
  ACR_NAME: ${{ vars.AZURE_ACR_NAME || 'acaScannerApp' }}
  ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER || format('{0}.azurecr.io', vars.AZURE_ACR_NAME || 'acascannerapp') }}
  IMAGE_NAME: scanner-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate frontend/backend build
        run: |
          cd scanner-app
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        run: |
          python -m py_compile scan_bridge.py complete.py
          python -m py_compile discovery_pipeline/orchestrator.py discovery_pipeline/reporting/dashboard.py

      - name: Check deployment prerequisites
        id: deploy_check
        run: |
          if [ -n "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${{ secrets.AZURE_REGISTRY_USERNAME }}" ] && [ -n "${{ secrets.AZURE_REGISTRY_PASSWORD }}" ]; then
            echo "can_registry_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_registry_push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy and push (missing credentials)
        if: steps.deploy_check.outputs.can_deploy != 'true' && steps.deploy_check.outputs.can_registry_push != 'true'
        run: echo "No deployment credentials found. Configure AZURE_CREDENTIALS for full deploy or AZURE_REGISTRY_USERNAME/AZURE_REGISTRY_PASSWORD for image push."

      - name: Azure login
        if: steps.deploy_check.outputs.can_deploy == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create image tag
        id: meta
        if: steps.deploy_check.outputs.can_deploy == 'true' || steps.deploy_check.outputs.can_registry_push == 'true'
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push image in ACR
        if: steps.deploy_check.outputs.can_deploy == 'true'
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:${{ steps.meta.outputs.tag }}" \
            --image "$IMAGE_NAME:latest" \
            --file Dockerfile \
            .

      - name: Log in to ACR with registry credentials
        if: steps.deploy_check.outputs.can_deploy != 'true' && steps.deploy_check.outputs.can_registry_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push image with Docker
        if: steps.deploy_check.outputs.can_deploy != 'true' && steps.deploy_check.outputs.can_registry_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Notify deploy skipped after push
        if: steps.deploy_check.outputs.can_deploy != 'true' && steps.deploy_check.outputs.can_registry_push == 'true'
        run: echo "Image pushed to ACR with registry credentials, but deployment was skipped because AZURE_CREDENTIALS is missing."

      - name: Resolve ACR login server
        id: acr
        if: steps.deploy_check.outputs.can_deploy == 'true'
        run: |
          LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Deploy image to Container App
        if: steps.deploy_check.outputs.can_deploy == 'true'
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:${{ steps.meta.outputs.tag }}"

      - name: Show active ingress URL
        if: steps.deploy_check.outputs.can_deploy == 'true'
        run: |
          FQDN=$(az containerapp show --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployment completed: https://$FQDN"
